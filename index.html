<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to FIFA World Cup 2026 · Mi Álbum</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#06090f;--surface:#0d1421;--surface2:#131d2e;--border:#1c2a40;--gold:#f0c040;--gold2:#c89a00;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--text:#e2e8f5;--muted:#5a6a88;--have-bg:#0a2018;--have-b:#22c55e;--need-bg:#1e0808;--need-b:#ef4444;--rep-bg:#081828;--rep-b:#3b82f6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
header{position:sticky;top:0;z-index:200;background:rgba(6,9,15,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(240,192,64,.2);box-shadow:0 4px 40px rgba(0,0,0,.5);}
.hi{max-width:1440px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;}
.lb{font-size:26px;}
.lt{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);line-height:1;}
.ly{font-size:10px;color:var(--muted);letter-spacing:3px;}
.sync-status{font-size:11px;padding:4px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:1px;}
.sync-ok{background:#0a2018;color:var(--green);border:1px solid var(--green);}
.sync-err{background:#1e0808;color:var(--red);border:1px solid var(--red);}
.sync-load{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.sbar{background:var(--surface);border-bottom:1px solid var(--border);}
.si{max-width:1440px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.stat{display:flex;flex-direction:column;align-items:center;min-width:64px;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;}
.sl{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.st .sv{color:var(--gold);} .sh .sv{color:var(--green);} .sn .sv{color:var(--red);} .sr .sv{color:var(--blue);}
.sep{width:1px;height:36px;background:var(--border);}
.pw{flex:1;min-width:180px;}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;}
.pb{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:3px;transition:width .6s;}
.toolbar{max-width:1440px;margin:0 auto;padding:16px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.sw{flex:1;min-width:220px;position:relative;}
.sw input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 14px 9px 38px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.sw input:focus{border-color:var(--gold);}
.si2{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.fg{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;}
.fb{padding:5px 12px;border:none;border-radius:5px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap;}
.fb.on{background:var(--gold);color:#000;}
.fb:hover:not(.on){color:var(--text);}
#album{max-width:1440px;margin:0 auto;padding:0 20px 40px;}
.sec{margin-bottom:28px;}
.sh2{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:border-color .2s;margin-bottom:10px;user-select:none;}
.sh2:hover{border-color:var(--gold);}
.sf{font-size:24px;line-height:1;}
.sn2{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;}
.smb{flex:1;}
.smt{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
.smf{height:100%;background:var(--gold);border-radius:2px;transition:width .4s;}
.sp{font-size:11px;color:var(--muted);}
.sbg{font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:20px;border:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-weight:600;}
.sar{color:var(--muted);transition:transform .3s;font-size:14px;}
.sar.col{transform:rotate(-90deg);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:7px;}
.grid.hidden{display:none;}
.stk{aspect-ratio:2/3;border-radius:9px;border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;background:var(--surface2);gap:3px;user-select:none;padding:4px;}
.stk:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.5);}
.stk.have{background:var(--have-bg);border-color:var(--have-b);}
.stk.need{background:var(--need-bg);border-color:var(--need-b);}
.stk.repeat{background:var(--rep-bg);border-color:var(--rep-b);}
.sn3{font-family:'Bebas Neue',sans-serif;font-size:16px;line-height:1;color:var(--text);}
.si3{font-size:18px;line-height:1;}
.sna{font-size:7px;color:var(--muted);text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px;line-height:1.2;}
.rb{position:absolute;top:-6px;right:-6px;background:var(--blue);color:#fff;font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.ov.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:320px;max-width:100%;box-shadow:0 40px 100px rgba(0,0,0,.7);animation:pop .2s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.88);opacity:0;}to{transform:scale(1);opacity:1;}}
.mt{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.mt2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;margin-bottom:2px;}
.mp{font-size:13px;color:var(--muted);margin-bottom:18px;}
.ma{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.mb{padding:10px 6px;border:2px solid transparent;border-radius:10px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.mb .mi{font-size:20px;}
.hb{background:var(--have-bg);border-color:var(--have-b);color:var(--green);}
.hb:hover,.hb.on{background:var(--green);color:#000;border-color:var(--green);}
.nb{background:var(--need-bg);border-color:var(--need-b);color:var(--red);}
.nb:hover,.nb.on{background:var(--red);color:#fff;border-color:var(--red);}
.rpb{background:var(--rep-bg);border-color:var(--rep-b);color:var(--blue);}
.rpb:hover,.rpb.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.rc{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;}
.rn{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--blue);min-width:36px;text-align:center;}
.rcc{width:30px;height:30px;border-radius:50%;border:2px solid var(--blue);background:transparent;color:var(--blue);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.rcc:hover{background:var(--blue);color:#fff;}
.mc{width:100%;padding:9px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;transition:all .15s;}
.mc:hover{border-color:var(--red);color:var(--red);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--gold);color:var(--gold);padding:9px 18px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;z-index:400;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:5px;}.lt{font-size:16px;}.sv{font-size:22px;}}
</style>
</head>

<header>
  <div class="hi">
    <div class="logo">
      <span class="lb">⚽</span>
      <div><div class="lt">Road to FIFA World Cup 2026</div><div class="ly">MI ÁLBUM PANINI</div></div>

    <span class="sync-status sync-load" id="syncStatus">⏳ Conectando...</span>
  </div>
</header>
<div class="sbar">

    <div class="sep"></div>
    <div class="stat sn"><div class="sv" id="sN">0</div><div class="sl">Me falta</div></div>
    <div class="sep"></div>
    <div class="stat sr"><div class="sv" id="sR">0</div><div class="sl">Repetidas</div></div>
    <div class="sep"></div>
    <div class="pw">

  </div>
</div>
<div class="toolbar">
  <div class="sw">
    <span class="si2">🔍</span>
    <input type="text" id="qry" placeholder="Buscar equipo, jugador o número..." oninput="render()">
  </div>
  <div class="fg">
    <button class="fb on" onclick="setF('all',this)">Todas</button>
    <button class="fb" onclick="setF('have',this)">✅ Tengo</button>
    <button class="fb" onclick="setF('need',this)">❌ Falta</button>
    <button class="fb" onclick="setF('repeat',this)">🔁 Repetida</button>
  </div>
</div>
<div id="album"><div class="loading">CARGANDO ÁLBUM...</div></div>
<div class="ov" id="ov" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div class="mt" id="mT"></div>
    <div class="mt2" id="mT2"></div>
    <div class="mp" id="mP"></div>
    <div class="ma">
      <button class="mb hb" onclick="setS('have')"><span class="mi">✅</span><span>La tengo</span></button>
      <button class="mb nb" onclick="setS('need')"><span class="mi">❌</span><span>Me falta</span></button>
      <button class="mb rpb" onclick="setS('repeat')"><span class="mi">🔁</span><span>Repetida</span></button>
    </div>
    <div class="rc" id="rc" style="display:none">
      <button class="rcc" onclick="chgR(-1)">−</button>
      <span class="rn" id="rn">2</span>
      <button class="rcc" onclick="chgR(1)">+</button>
    </div>
    <button class="mc" onclick="closeM()">Cerrar</button>
  </div>
</div>
<div class="toast" id="toast"></div>

let state = {};
let filter = 'all';
let activeKey = null;
let synced = false;

// ── Supabase helpers ──────────────────────────────────────────
async function sbFetch(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return method === 'GET' ? r.json() : r;
}

async function loadFromSupabase() {
  setSyncStatus('load');
  try {
    const rows = await sbFetch('stickers?select=id,status,repeat_count');
    if (rows.length === 0) {
      // Primera vez: cargar estado inicial y subir todo
      await initAndUpload();
    } else {
      state = {};
      rows.forEach(r => {
        state[r.id] = { status: r.status, repeatCount: r.repeat_count || 2 };
      });
      // Fill any missing keys from INIT_STATE
      for (const [k, v] of Object.entries(INIT_STATE)) {
        if (!state[k]) state[k] = { status: v, repeatCount: 2 };
      }
      setSyncStatus('ok');
    }
  } catch(e) {
    console.error('Supabase load error:', e);
    // Fallback to localStorage
    const ls = localStorage.getItem('panini2026_fallback');
    if (ls) { try { state = JSON.parse(ls); } catch(_) { initLocal(); } }
    else initLocal();
    setSyncStatus('err');
  }
  render();
}

async function initAndUpload() {
  initLocal();
  setSyncStatus('load');
  try {
    const rows = Object.entries(INIT_STATE).map(([id, status]) => ({
      id, status, repeat_count: 2
    }));
    // Upload in batches of 200
    for (let i = 0; i < rows.length; i += 200) {
      await sbFetch('stickers', 'POST', rows.slice(i, i+200));
    }
    setSyncStatus('ok');
  } catch(e) {
    console.error('Upload error:', e);
    setSyncStatus('err');
  }
}

async function saveToSupabase(key, status, repeatCount) {
  try {
    await sbFetch('stickers', 'POST', [{
      id: key,
      status: status,
      repeat_count: repeatCount,
      updated_at: new Date().toISOString()
    }]);
    setSyncStatus('ok');
    // Also save to localStorage as backup
    localStorage.setItem('panini2026_fallback', JSON.stringify(state));
  } catch(e) {
    console.error('Save error:', e);
    setSyncStatus('err');
    localStorage.setItem('panini2026_fallback', JSON.stringify(state));
  }
}

function initLocal() {
  state = {};
  for (const [k, v] of Object.entries(INIT_STATE)) {
    state[k] = { status: v, repeatCount: 2 };
  }
}

function setSyncStatus(s) {
  const el = document.getElementById('syncStatus');
  if (s === 'ok') { el.className='sync-status sync-ok'; el.textContent='☁️ Sincronizado'; }
  else if (s === 'err') { el.className='sync-status sync-err'; el.textContent='⚠️ Sin conexión'; }
  else { el.className='sync-status sync-load'; el.textContent='⏳ Sincronizando...'; }
}

// ── UI ────────────────────────────────────────────────────────
function getS(k) { return state[k] || { status: 'need', repeatCount: 2 }; }

function updateStats() {
  let total=0,have=0,need=0,rep=0;
  SECTIONS.forEach(sec => Object.keys(sec.players).forEach(n => {
    total++;
    const st = getS(sec.id+'_'+n).status;
    if(st==='have') have++;
    else if(st==='repeat'){have++;rep++;}
    else need++;
  }));
  document.getElementById('sT').textContent=total;
  document.getElementById('sH').textContent=have;
  document.getElementById('sN').textContent=need;
  document.getElementById('sR').textContent=rep;
  const pct=total?Math.round(have/total*100):0;
  document.getElementById('pP').textContent=pct+'%';
  document.getElementById('pF').style.width=pct+'%';
}

function setF(f,btn) {
  filter=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render() {
  const q=document.getElementById('qry').value.toLowerCase().trim();
  const album=document.getElementById('album');
  album.innerHTML='';
  SECTIONS.forEach(sec => {
    const stickers=Object.entries(sec.players).map(([n,nm])=>({key:sec.id+'_'+n,num:parseInt(n),name:nm,sec}));
    const filtered=stickers.filter(s=>{
      const st=getS(s.key).status;
      const fOk=filter==='all'||st===filter;
      const qOk=!q||String(s.num).includes(q)||s.name.toLowerCase().includes(q)||sec.name.toLowerCase().includes(q)||sec.id.toLowerCase().includes(q);
      return fOk&&qOk;
    });
    if(!filtered.length) return;
    const tot=stickers.length;
    const hv=stickers.filter(s=>['have','repeat'].includes(getS(s.key).status)).length;
    const pct=Math.round(hv/tot*100);
    const d=document.createElement('div');
    d.className='sec';
    d.innerHTML=`
      <div class="sh2" onclick="toggleS('${sec.id}')">
        <span class="sf">${sec.flag}</span>
        <span class="sn2">${sec.name}</span>
        <div class="smb">
          <div style="display:flex;justify-content:space-between">
            <span class="sp">${hv}/${tot}</span><span class="sp">${pct}%</span>
          </div>
          <div class="smt"><div class="smf" style="width:${pct}%"></div></div>
        </div>
        <span class="sbg">${filtered.length} estampas</span>
        <span class="sar" id="ar-${sec.id}">▾</span>
      </div>
      <div class="grid" id="gr-${sec.id}">
        ${filtered.map(s=>renderStk(s)).join('')}
      </div>`;
    album.appendChild(d);
  });
  updateStats();
}

function renderStk(s) {
  const st=getS(s.key);
  const icons={have:'✅',need:'❌',repeat:'🔁'};
  const badge=st.status==='repeat'?`<div class="rb">${st.repeatCount||2}</div>`:'';
  return `<div class="stk ${st.status}" onclick="openM('${s.key}','${s.sec.name}','${s.sec.flag}',${s.num},'${s.name.replace(/'/g,"\\'")}')">
    ${badge}
    <span class="sn3">${s.sec.id} ${s.num}</span>
    <span class="si3">${icons[st.status]}</span>
    <span class="sna">${s.name}</span>
  </div>`;
}

function toggleS(id) {
  document.getElementById('gr-'+id).classList.toggle('hidden');
  document.getElementById('ar-'+id).classList.toggle('col');
}

function openM(key,team,flag,num,player) {
  activeKey=key;
  const st=getS(key);
  document.getElementById('mT').textContent=flag+' '+team;
  document.getElementById('mT2').textContent='#'+String(num).padStart(3,'0');
  document.getElementById('mP').textContent=player;
  document.getElementById('rn').textContent=st.repeatCount||2;
  document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));
  const map={have:'.hb',need:'.nb',repeat:'.rpb'};
  document.querySelector(map[st.status||'need'])?.classList.add('on');
  document.getElementById('rc').style.display=st.status==='repeat'?'flex':'none';
  document.getElementById('ov').classList.add('open');
}

function closeM() {
  document.getElementById('ov').classList.remove('open');
  activeKey=null;
}

function setS(status) {
  if(!activeKey) return;
  const prev=getS(activeKey);
  const rc = prev.repeatCount||2;
  state[activeKey]={status,repeatCount:rc};
  document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));
  document.querySelector(status==='have'?'.hb':status==='need'?'.nb':'.rpb')?.classList.add('on');
  document.getElementById('rc').style.display=status==='repeat'?'flex':'none';
  render();
  const msgs={have:'✅ Marcada como obtenida',need:'❌ Marcada como faltante',repeat:'🔁 Marcada como repetida'};
  showToast(msgs[status]);
  setSyncStatus('load');
  saveToSupabase(activeKey, status, rc);
}

function chgR(d) {
  if(!activeKey) return;
  const st=state[activeKey]||{status:'repeat',repeatCount:2};
  st.repeatCount=Math.max(2,(st.repeatCount||2)+d);
  state[activeKey]=st;
  document.getElementById('rn').textContent=st.repeatCount;
  render();
  saveToSupabase(activeKey, st.status, st.repeatCount);
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── Init ──────────────────────────────────────────────────────
loadFromSupabase();
</script>
